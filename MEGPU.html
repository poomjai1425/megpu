<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ME GPU — ระบบจัดการสต็อกสินค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel=\"stylesheet\" />
<style>
/* ── TOKENS & CORE STYLES ──────────────────────── */
:root {
  --bg: #f3fff6;
  --panel: rgba(255,255,255,.95);
  --line: rgba(34,197,94,.15);
  --text: #17311f;
  --muted: #55715d;
  --acc: #22c55e;
  --acc2: #16a34a;
  --danger: #ef4444;
  --info: #0ea5e9;
  --radius: 16px;
  --shadow: 0 10px 25px rgba(23,49,31,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Prompt',sans-serif;background:var(--bg);color:var(--text);min-height:100%;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 80% 20%,rgba(34,197,94,.06) 0%,transparent 50%);z-index:-1;}

/* ── LAYOUT ────────────────────────────────────── */
.navbar {
  background: var(--panel); border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand { font-size: 1.3rem; font-weight: 700; color: var(--acc2); display: flex; align-items: center; gap: 8px; }
.nav-menu { display: flex; gap: 8px; align-items: center; }
.nav-btn {
  background: transparent; border: none; padding: 10px 16px; font-family: inherit;
  font-size: .95rem; font-weight: 500; color: var(--muted); border-radius: 10px; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.nav-btn:hover, .nav-btn.active { color: var(--acc2); background: rgba(34,197,94,.08); }
.nav-btn.danger { color: var(--danger); }
.nav-btn.danger:hover { background: rgba(239,68,68,.08); }

main { max-width: 1280px; margin: 0 auto; padding: 32px 24px; display: none; }
.page { display: none; animation: fadeIn .3s ease forwards; }
.page.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

/* ── COMPONENTS & CARDS ────────────────────────── */
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 1.6rem; font-weight: 700; position: relative; padding-left: 14px; }
.page-title::before { content:''; position: absolute; left: 0; top: 15%; width: 5px; height: 70%; background: var(--acc); border-radius: 4px; }

.btn {
  font-family: inherit; padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: .95rem;
  cursor: pointer; transition: all .2s; border: none; display: inline-flex; align-items: center; gap: 8px; justify-content: center;
}
.btn-primary { background: var(--acc2); color: white; box-shadow: 0 4px 12px rgba(22,163,74,.2); }
.btn-primary:hover { background: #117f38; transform: translateY(-1px); }
.btn-secondary { background: var(--panel); border: 1px solid var(--line); color: var(--text); }
.btn-secondary:hover { background: rgba(34,197,94,.05); }

/* หมวดหมู่สินค้า */
.cat-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 24px; scrollbar-width: none; }
.cat-container::-webkit-scrollbar { display: none; }
.cat-pill {
  padding: 8px 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
  color: var(--muted); font-size: .9rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .2s;
}
.cat-pill:hover, .cat-pill.active { background: var(--acc2); color: white; border-color: var(--acc2); box-shadow: 0 4px 10px rgba(22,163,74,.15); }

/* 📦 PRODUCT CARDS SYSTEM (ปรับปรุงใหม่ล็อกขนาดรูปภาพ) */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
.product-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 18px; box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column;
  transition: transform .2s, box-shadow .2s;
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(23,49,31,.12); }

/* กล่องล็อกขนาดรูปภาพถาวร UI ไม่เบี้ยวแน่นอน */
.prod-img-wrap {
  width: 100%; height: 160px; border-radius: 10px; overflow: hidden;
  margin-bottom: 14px; background: rgba(34,197,94,.03); border: 1px solid rgba(34,197,94,.08);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.prod-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.prod-no-img { font-size: 2.2rem; filter: grayscale(0.5); opacity: 0.6; }

.prod-cat-badge {
  position: absolute; top: 10px; left: 10px; background: rgba(23,49,31,.85); color: #fff;
  padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; backdrop-filter: blur(4px);
}
.prod-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; color: var(--text); }

/* ส่วนแสดงราคาต้นทุนคู่กับราคาขาย */
.prod-price-box {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  background: rgba(34,197,94,.05); border-radius: 10px; padding: 10px; margin-bottom: 14px;
}
.price-tag { display: flex; flex-direction: column; }
.price-tag .label { font-size: .75rem; color: var(--muted); margin-bottom: 2px; }
.price-tag .val { font-size: .95rem; font-weight: 700; }
.price-tag.cost { color: var(--muted); border-right: 1px solid rgba(34,197,94,.12); }
.price-tag.sale { color: var(--acc2); padding-left: 4px; }

.prod-stock { font-size: .9rem; color: var(--muted); margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
.stock-num { font-weight: 700; color: var(--text); font-size: 1.05rem; }
.stock-num.empty { color: var(--danger); }

.prod-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
.action-btn {
  padding: 8px; font-family: inherit; font-size: .85rem; font-weight: 600; border: none;
  border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background .2s;
}
.btn-sell { background: rgba(34,197,94,.1); color: var(--acc2); }
.btn-sell:hover { background: var(--acc2); color: white; }
.btn-restock { background: rgba(14,165,233,.1); color: var(--info); }
.btn-restock:hover { background: var(--info); color: white; }

/* 📋 TRANSACTION STYLES (ปรับปรุงให้อ่านง่าย ชัดเจน) */
.txn-list { display: flex; flex-direction: column; gap: 10px; }
.txn-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  padding: 14px 18px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.txn-main { display: flex; align-items: center; gap: 14px; }
.txn-badge {
  width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
}
.txn-badge.sale { background: rgba(239,68,68,.1); color: var(--danger); }
.txn-badge.restock { background: rgba(34,197,94,.1); color: var(--acc2); }
.txn-info h4 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
.txn-meta { font-size: .8rem; color: var(--muted); }
.txn-right { text-align: right; }
.txn-amount { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
.txn-amount.sale { color: var(--danger); }
.txn-amount.restock { color: var(--acc2); }
.txn-del-btn { background: transparent; border: none; color: var(--danger); opacity: 0.4; cursor: pointer; padding: 4px; border-radius: 4px; }
.txn-del-btn:hover { opacity: 1; background: rgba(239,68,68,.08); }

/* 🔒 AUTH & MODAL ──────────────────────────────── */
#auth-wall { max-width: 400px; margin: 100px auto padding: 32px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
.input-group { margin-bottom: 16px; text-align: left; }
.input-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
.form-input {
  width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
  font-family: inherit; font-size: 100%; color: var(--text); background: rgba(255,255,255,.5); transition: border-color .2s;
}
.form-input:focus { outline: none; border-color: var(--acc2); background: #fff; }

.backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,.4); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.backdrop.active { opacity: 1; pointer-events: auto; }
.modal { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,.15); transform: translateY(16px); transition: transform .2s; }
.backdrop.active .modal { transform: translateY(0); }
.modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* 📱 RESPONSIVE ────────────────────────────────── */
@media (max-width: 768px) {
  .navbar { padding: 0 16px; }
  .nav-brand span { display: none; }
  main { padding: 20px 16px; }
  .products-grid { grid-template-columns: 1fr; }
  .txn-card { flex-direction: column; align-items: flex-start; gap: 12px; position: relative; }
  .txn-right { text-align: left; width: 100%; padding-left: 56px; display: flex; justify-content: space-between; align-items: center; }
  .txn-del-btn { position: absolute; top: 14px; right: 14px; }
}
</style>
</head>
<body>

  <div id="auth-wall">
    <h2 style="margin-bottom:8px; color:var(--acc2);">ME GPU Stock</h2>
    <p style="font-size:.9rem; color:var(--muted); margin-bottom:24px;">กรุณากรอกรหัสผ่านเพื่อเข้าใช้งานระบบ</p>
    <div class="input-group">
      <label>PASSWORD</label>
      <input type="password" id="wall-pass" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="login()">เข้าสู่ระบบ 🚀</button>
  </div>

  <nav class="navbar" id="topnav" style="display:none;">
    <div class="nav-brand">📦 <span>ME GPU Stock</span></div>
    <div class="nav-menu">
      <button class="nav-btn active" id="m-stock" onclick="switchPage('stock')">คลังสินค้า</button>
      <button class="nav-btn" id="m-txns" onclick="switchPage('txns')">ประวัติธุรกรรม</button>
      <button class="nav-btn danger" onclick="triggerResetSystem()">⚠️ รีเซ็ตระบบทั้งหมด</button>
      <button class="nav-btn" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>

  <main id="main-content">
    
    <div id="page-stock" class="page active">
      <div class="header-row">
        <h2 class="page-title">รายการสินค้าคงคลัง</h2>
        <button class="btn btn-primary" onclick="openAddModal()">＋ เพิ่มสินค้าใหม่</button>
      </div>
      
      <div class="cat-container" id="cat-bar"></div>
      
      <div class="products-grid" id="products-list"></div>
    </div>

    <div id="page-txns" class="page">
      <div class="header-row">
        <h2 class="page-title">ประวัติการรับเข้า-ขายออก</h2>
      </div>
      <div class="txn-list" id="txns-list"></div>
    </div>

  </main>

  <div class="backdrop" id="modal-add">
    <div class="modal">
      <h3 class="modal-title">เพิ่มสินค้าใหม่เข้าสต็อก</h3>
      <div class="input-group">
        <label>หมวดหมู่สินค้า</label>
        <select id="p-cat" class="form-input"></select>
      </div>
      <div class="input-group">
        <label>ชื่อสินค้า</label>
        <input type="text" id="p-name" class="form-input" placeholder="เช่น Intel Core i5-13400F" />
      </div>
      <div class="input-group">
        <label>ลิงก์รูปภาพสินค้า (Image URL)</label>
        <input type="text" id="p-img" class="form-input" placeholder="https://example.com/image.jpg (เว้นว่างได้)" />
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="input-group">
          <label>ราคาทุน (บาท)</label>
          <input type="number" id="p-cost" class="form-input" placeholder="0" />
        </div>
        <div class="input-group">
          <label>ราคาขาย (บาท)</label>
          <input type="number" id="p-price" class="form-input" placeholder="0" />
        </div>
      </div>
      <div class="input-group">
        <label>จำนวนเริ่มต้น (ชิ้น)</label>
        <input type="number" id="p-qty" class="form-input" placeholder="0" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add')">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveNewProduct()">บันทึกรายการ</button>
      </div>
    </div>
  </div>

  <div class="backdrop" id="modal-action">
    <div class="modal">
      <h3 class="modal-title" id="action-title">จัดการสินค้า</h3>
      <p id="action-pname" style="margin-bottom:16px; font-weight:600; color:var(--muted);"></p>
      <div class="input-group">
        <label id="action-label">จำนวน</label>
        <input type="number" id="action-qty" class="form-input" min="1" value="1" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('action')">ยกเลิก</button>
        <button class="btn btn-primary" id="action-submit-btn">ยืนยัน</button>
      </div>
    </div>
  </div>

<script>
// ══════════════════════════════════════════
//  CONFIG & DATABASE KEYS
// ══════════════════════════════════════════
const BIN_ID = '6a2bc402e41b4d34e402fd8a'; 
const MASTER_KEY = '$2a$10$BBUO3saKM9TSrp71B2H6.evgxJDS2aNSLw.hqZCH2oEuOzIlrfSVq';

// ลำดับหมวดหมู่ล็อกตามโจทย์ต้องการเป๊ะๆ
const CATEGORIES = ['CPU', 'MB', 'RAM', 'GPU', 'HDD', 'SSD', 'PSU', 'COOLER', 'CASE', 'MONITOR', 'GAMING GEAR'];

let products = [];
let txns = [];
let delRequests = [];
let currentCategory = 'ALL';
let activeActionProductId = null;
let activeActionType = ''; 

// ══════════════════════════════════════════
//  AUTH SYSTEM
// ══════════════════════════════════════════
function login() {
  const p = document.getElementById('wall-pass').value;
  if(p === 'megpu123') { // เปลี่ยนรหัสผ่านตรงนี้ได้ครับ
    localStorage.setItem('megpu_authenticated', 'true');
    initApp();
  } else {
    alert('รหัสผ่านไม่ถูกต้องครับ');
  }
}
function logout() {
  localStorage.removeItem('megpu_authenticated');
  location.reload();
}
function checkAuth() {
  return localStorage.getItem('megpu_authenticated') === 'true';
}

// ══════════════════════════════════════════
//  INIT APP & DATA FETCH
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if(checkAuth()) {
    initApp();
  }
});

async function initApp() {
  document.getElementById('auth-wall').style.display = 'none';
  document.getElementById('topnav').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
  
  buildCategoryBar();
  buildCategorySelect();
  
  // โหลด Local ล่วงหน้าเพื่อให้แอปขึ้นไว
  if(localStorage.getItem('mg-products')) products = JSON.parse(localStorage.getItem('mg-products'));
  if(localStorage.getItem('mg-txns')) txns = JSON.parse(localStorage.getItem('mg-txns'));
  
  renderProducts();
  renderTxns();
  
  await loadCloudData();
}

async function loadCloudData() {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    const res = await r.json();
    if(res.record) {
      products = res.record.products || [];
      txns = res.record.txns || [];
      delRequests = res.record.delRequests || [];
      saveLocal();
      renderProducts();
      renderTxns();
    }
  } catch(e) {
    console.error("Cloud fetch failed, using local fallback", e);
  }
}

function saveLocal() {
  localStorage.setItem('mg-products', JSON.stringify(products));
  localStorage.setItem('mg-txns', JSON.stringify(txns));
}

async function saveCloud() {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify({ products, txns, delRequests })
    });
  } catch(e) {
    alert('ไม่สามารถอัปเดตข้อมูลขึ้นคลาวด์ได้ แต่บันทึกในเครื่องแล้ว');
  }
}

async function saveAll() {
  saveLocal();
  await saveCloud();
}

// ══════════════════════════════════════════
//  UI GENERATORS
// ══════════════════════════════════════════
function buildCategoryBar() {
  const bar = document.getElementById('cat-bar');
  let h = `<div class="cat-pill active" id="cp-all" onclick="filterCategory('ALL')">ทั้งหมด (ALL)</div>`;
  CATEGORIES.forEach(c => {
    h += `<div class="cat-pill" id="cp-${c.replace(' ','_')}" onclick="filterCategory('${c}')">${c}</div>`;
  });
  bar.innerHTML = h;
}

function buildCategorySelect() {
  const sel = document.getElementById('p-cat');
  let h = '';
  CATEGORIES.forEach(c => { h += `<option value="${c}">${c}</option>`; });
  sel.innerHTML = h;
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  if(cat === 'ALL') document.getElementById('cp-all').classList.add('active');
  else document.getElementById(`cp-${cat.replace(' ','_')}`).classList.add('active');
  renderProducts();
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`m-${page}`).classList.add('active');
}

// ══════════════════════════════════════════
//  PRODUCTS SYSTEM & RENDER
// ══════════════════════════════════════════
function renderProducts() {
  const grid = document.getElementById('products-list');
  
  // กรองสินค้าตามหมวดหมู่
  let filtered = currentCategory === 'ALL' ? [...products] : products.filter(p => p.category === currentCategory);
  
  // เรียงลำดับสินค้าตามลิสต์ CATEGORIES ล็อกไว้ตายตัว
  filtered.sort((a, b) => {
    let idxA = CATEGORIES.indexOf(a.category);
    let idxB = CATEGORIES.indexOf(b.category);
    if(idxA === -1) idxA = 999;
    if(idxB === -1) idxB = 999;
    if(idxA !== idxB) return idxA - idxB;
    return a.productName.localeCompare(b.productName, 'th');
  });

  if(filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--muted);">ไม่มีสินค้าในหมวดหมู่นี้</div>`;
    return;
  }

  let h = '';
  filtered.forEach(p => {
    const isOut = p.qty <= 0;
    h += `
      <div class="product-card">
        <div class="prod-img-wrap">
          <span class="prod-cat-badge">${p.category}</span>
          ${p.imgUrl ? `<img src="${esc(p.imgUrl)}" alt="${esc(p.productName)}">` : `<span class="prod-no-img">📷</span>`}
        </div>
        <h3 class="prod-name">${esc(p.productName)}</h3>
        
        <div class="prod-price-box">
          <div class="price-tag cost">
            <span class="label">ต้นทุน</span>
            <span class="val">฿${Number(p.cost || 0).toLocaleString()}</span>
          </div>
          <div class="price-tag sale">
            <span class="label">ราคาขาย</span>
            <span class="val">฿${Number(p.price || 0).toLocaleString()}</span>
          </div>
        </div>

        <div class="prod-stock">
          <span>สถานะสต็อก</span>
          <span class="stock-num ${isOut?'empty':''}">${isOut ? 'หมด' : p.qty + ' ชิ้น'}</span>
        </div>

        <div class="prod-actions">
          <button class="action-btn btn-sell" onclick="openActionModal(${p.id}, 'sale')" ${isOut?'disabled style="opacity:0.4;cursor:not-allowed;"':''}>📤 ขายออก</button>
          <button class="action-btn btn-restock" onclick="openActionModal(${p.id}, 'restock')">📥 รับเข้า</button>
        </div>
      </div>
    `;
  });
  grid.innerHTML = h;
}

// ══════════════════════════════════════════
//  TRANSACTIONS SYSTEM & RENDER
// ══════════════════════════════════════════
function renderTxns() {
  const list = document.getElementById('txns-list');
  if(txns.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted);">ยังไม่มีประวัติธุรกรรม</div>`;
    return;
  }

  // เรียงเอาประวัติล่าสุดขึ้นก่อน
  let sortedTxns = [...txns].sort((a,b) => b.id - a.id);

  let h = '';
  sortedTxns.forEach(t => {
    const isSale = t.type === 'sale';
    h += `
      <div class="txn-card">
        <div class="txn-main">
          <div class="txn-badge ${isSale?'sale':'restock'}">${isSale?'📤':'📥'}</div>
          <div class="txn-info">
            <h4>${esc(t.productName)}</h4>
            <div class="txn-meta">หมวดหมู่: ${t.category} · เวลา: ${t.date}</div>
          </div>
        </div>
        <div class="txn-right">
          <div class="txn-amount ${isSale?'sale':'restock'}">
            ${isSale ? '-' : '+'}${t.qty} ชิ้น
          </div>
          <div style="font-size:0.8rem; color:var(--muted);">
            มูลค่ารวม: ฿${Number(t.totalPrice || 0).toLocaleString()}
          </div>
        </div>
        <button class="txn-del-btn" onclick="requestDeleteTxn(${t.id})" title="ลบธุรกรรมนี้">🗑️</button>
      </div>
    `;
  });
  list.innerHTML = h;
}

// ══════════════════════════════════════════
//  LOGIC OPERATIONS
// ══════════════════════════════════════════
function openAddModal() { document.getElementById('modal-add').classList.add('active'); }
function closeModal(m) { document.getElementById(`modal-${m}`).classList.remove('active'); }

async function saveNewProduct() {
  const cat = document.getElementById('p-cat').value;
  const name = document.getElementById('p-name').value.trim();
  const imgUrl = document.getElementById('p-img').value.trim();
  const cost = parseFloat(document.getElementById('p-cost').value) || 0;
  const price = parseFloat(document.getElementById('p-price').value) || 0;
  const qty = parseInt(document.getElementById('p-qty').value) || 0;

  if(!name) return alert('กรุณากรอกชื่อสินค้า');

  const newP = { id: Date.now(), category: cat, productName: name, imgUrl, cost, price, qty };
  products.push(newP);
  
  // สร้างธุรกรรมตั้งต้นถ้ามีจำนวนมากกว่า 0
  if(qty > 0) {
    txns.push({
      id: Date.now() + 1,
      productId: newP.id,
      productName: name,
      category: cat,
      type: 'restock',
      qty: qty,
      totalPrice: cost * qty,
      date: new Date().toLocaleString('th-TH')
    });
  }

  await saveAll();
  closeModal('add');
  renderProducts();
  renderTxns();
  
  // เคลียร์ฟอร์ม
  document.getElementById('p-name').value = '';
  document.getElementById('p-img').value = '';
  document.getElementById('p-cost').value = '';
  document.getElementById('p-price').value = '';
  document.getElementById('p-qty').value = '';
}

function openActionModal(pid, type) {
  const p = products.find(x => x.id === pid);
  if(!p) return;
  activeActionProductId = pid;
  activeActionType = type;

  document.getElementById('action-title').innerText = type === 'sale' ? '📤 บันทึกการขายออกสินค้า' : '📥 บันทึกการรับเข้าสต็อก';
  document.getElementById('action-pname').innerText = p.productName;
  document.getElementById('action-label').innerText = type === 'sale' ? `จำนวนที่จะขาย (มีอยู่ ${p.qty} ชิ้น)` : 'จำนวนที่รับเพิ่ม';
  
  const qtyInput = document.getElementById('action-qty');
  qtyInput.value = 1;
  qtyInput.max = type === 'sale' ? p.qty : '';

  document.getElementById('action-submit-btn').onclick = submitAction;
  document.getElementById('modal-action').classList.add('active');
}

async function submitAction() {
  const qty = parseInt(document.getElementById('action-qty').value) || 0;
  if(qty <= 0) return alert('กรุณากรอกจำนวนให้ถูกต้อง');

  const p = products.find(x => x.id === activeActionProductId);
  if(!p) return;

  if(activeActionType === 'sale') {
    if(qty > p.qty) return alert('สินค้าในคลังมีไม่เพียงพอต่อการขาย');
    p.qty -= qty;
    txns.push({
      id: Date.now(),
      productId: p.id,
      productName: p.productName,
      category: p.category,
      type: 'sale',
      qty: qty,
      totalPrice: p.price * qty, // ขายคิดจากราคาขาย
      date: new Date().toLocaleString('th-TH')
    });
  } else {
    p.qty += qty;
    txns.push({
      id: Date.now(),
      productId: p.id,
      productName: p.productName,
      category: p.category,
      type: 'restock',
      qty: qty,
      totalPrice: p.cost * qty, // รับเข้าคิดจากต้นทุน
      date: new Date().toLocaleString('th-TH')
    });
  }

  await saveAll();
  closeModal('action');
  renderProducts();
  renderTxns();
}

async function requestDeleteTxn(id) {
  if(!confirm('คุณต้องการลบรายการธุรกรรมนี้และดึงยอดสต็อกกลับใช่หรือไม่?')) return;
  const t = txns.find(x => x.id === id);
  if(!t) return;

  const p = products.find(x => x.id === t.productId);
  if(p) {
    if(t.type === 'sale') p.qty += t.qty; // คืนสต็อกกรณีลบยอดขาย
    else p.qty = Math.max(0, p.qty - t.qty); // หักออกกรณีลบยอดรับเข้า
  }

  txns = txns.filter(x => x.id !== id);
  await saveAll();
  renderProducts();
  renderTxns();
}

// ══════════════════════════════════════════
//  ⚠️ SYSTEM RESET FUNCTION (ล้างข้อมูลระบบทั้งหมด)
// ══════════════════════════════════════════
async function triggerResetSystem() {
  const conf1 = confirm("⚠️ คำเตือนขั้นเด็ดขาด!\nคุณต้องการลบข้อมูลสต็อกสินค้าและประวัติธุรกรรมทั้งหมดใช่หรือไม่?");
  if(!conf1) return;
  const conf2 = confirm("ยืนยันอีกครั้ง? ข้อมูลทั้งหมดบนคลาวด์จะถูกเคลียร์เป็นศูนย์และไม่สามารถกู้คืนได้");
  if(!conf2) return;

  products = [];
  txns = [];
  delRequests = [];
  
  localStorage.removeItem('mg-products');
  localStorage.removeItem('mg-txns');
  
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify({ products: [], txns: [], delRequests: [] })
    });
    alert('ล้างฐานข้อมูลสต็อกและธุรกรรมสะอาดเรียบร้อยแล้วครับ!');
    location.reload();
  } catch(e) {
    alert('เคลียร์ในเครื่องสำเร็จ แต่เกิดข้อผิดพลาดในการล้างคลาวด์');
  }
}

// UTILS
function esc(s) {
  if(!s) return '';
  return s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
